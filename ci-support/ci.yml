populate-remote-cache/trigger:
  stage: build
  variables:
    CI_SUPPORT_TRIGGER: "populate_remote_cache_trigger"
  trigger:
    include:
      - ci-support/populate-remote-cache-ci.yml
    strategy: depend
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ci-support/ci.yml
        - ci-support/util.yml
        - ci-support/populate-remote-cache-ci.yml
        - .bazelversion
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE == "nightly"

cache-test-ci/trigger:
  stage: build
  variables:
    CI_SUPPORT_TRIGGER: "cache_test_ci_trigger"
    CI_HOST_PLATFORM: $CI_HOST_PLATFORM
    BUILD_OPTIONS: $BUILD_OPTIONS
  trigger:
    include:
      - ci-support/bazel-cache-tools/cache-test-ci.yml
    strategy: depend
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger" && $TRIGGERER == "CACHE_TEST_CI"

eslint-ci/trigger:
  stage: build
  variables:
    CI_SUPPORT_TRIGGER: "eslint_ci_trigger"
  trigger:
    include:
      - ci-support/eslint-ci.yml
    strategy: depend
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ci-support/ci.yml
        - ci-support/util.yml
        - ci-support/eslint-ci.yml
        - apps/**/*
        - c8/**/*
        - platform/gamesite/frontend/**/*
        - reality/**/*
        - rules/**/*
        - scripts/**/*

