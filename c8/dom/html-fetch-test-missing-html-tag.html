<head>
    <title>My Sample Page</title>
    <title>Ignore a second title</title>
    <meta charset="UTF-8">
    <meta name="description" content="This is a sample page">
    <meta name="keywords" content="HTML, CSS, Sample">
    <!-- Classic script with no type implies javascript. -->
    <script>
        globalThis.orderResult += "0"

        const expectScriptsToEqual = (expectedScripts) => {
            const totalScripts = document.getElementsByTagName('script').length
            if (totalScripts !== expectedScripts) {
                globalThis.orderResult += `(fail scriptNum ${totalScripts} vs. ${expectedScripts})`
            }
        }

        const fail = (message) => {
            globalThis.orderResult += `(fail ${message})`
        }

        expectScriptsToEqual(1)
    </script>
    <!-- Importmap script. -->
    <script type="importmap">
        {
            "imports": {
                "fetch-test-import": "./html-fetch-test-6.js"
            }
        }
    </script>
    <!-- Classic script with empty string type implies javascript. -->
    <script type>
        globalThis.orderResult += "-1"
        expectScriptsToEqual(3)

        let domContentLoaded = false

        document.addEventListener('DOMContentLoaded', () => {
            expectScriptsToEqual(19)
            globalThis.orderResult += "-DONE"
            domContentLoaded = true
        })

        const onloadHandler = () => {
          if (!globalThis.dynamicAsyncExecuted) {
            fail("dynamic (default async) script not executed")
          }
          if (!globalThis.dynamicNoAsyncExecuted) {
            fail("dynamic async=false script not executed")
          }
          if (!domContentLoaded) {
            fail("DOMContentLoaded event not fired")
          }
          globalThis.loadDone()
        }
    </script>
    <!-- Classic script. (defer is ignored for inline javascript) -->
    <script defer>
        globalThis.orderResult += "-2"
        expectScriptsToEqual(4)
    </script>
    <!-- Module external script (adds "-8" to order result)-->
    <script type="module" src="./html-fetch-test-7.js"></script>
    <!-- Deferred external script (adds "-9" to order result)-->
    <script defer src="./html-fetch-test-0.js"></script>
    <!-- Classic external script (adds "-3" to order result)-->
    <script type="" src="./html-fetch-test-1.js"></script>
    <!-- Async external script (calls globalThis.doneAsync0())-->
    <script async src="./html-fetch-test-2.js"></script>
    <!-- Classic script. (async is ignored for inline javascript) -->
    <script async>
        globalThis.orderResult += "-4"
        expectScriptsToEqual(9)
    </script>
    <script type="bad/mime">
        globalThis.orderResult += "-bad"
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #333;
        }
        @media (max-width: 700px) {
            main {
                margin: 0 auto;
                width: auto;
            }
        }
    </style>
    <script type="text/javascript">
        globalThis.orderResult += "-5"
        expectScriptsToEqual(11)
    </script>
</head>
<!--<body onload="globalThis.orderResult += '-LOADED'">-->
<body onload="onloadHandler()">
    <!-- Classic external script (adds "-6" to order result)-->
    <script src="./html-fetch-test-3.js"></script>
    <!-- Module script. -->
    <script type="module">
        import { appendToOrderResult } from 'fetch-test-import'
        appendToOrderResult("-10")
        expectScriptsToEqual(19)
    </script>
    <!-- Deferred external script (adds "-11" to order result)-->
    <script defer src="./html-fetch-test-4.js"></script>
    <!-- Async external script (calls globalThis.doneAsync1())-->
    <script async src="./html-fetch-test-5.js"></script>
    <!-- Not a javascript mime type, so ignore. -->
    <!-- Header -->
    <header style="background-color: #f8f9fa; padding: 10px;">
        <h1>Welcome to My Sample Page</h1>
    </header>
    <script type="text/javascript">
        globalThis.orderResult += "-7"
        expectScriptsToEqual(16)

        // Dynamic script with an inline script will execute to append -7a to order result.
        const script = document.createElement('script')
        script.text = "globalThis.orderResult += '-7a'"
        document.body.appendChild(script)

        // Add dynamic script with async=false should block window load event.
        const script2 = document.createElement('script')
        script2.async = false
        script2.src = './html-fetch-test-8.js'

        // Add dynamic script with default async (forceAsync is true) should also block window load
        // event. Adding this one by setting src after appending to body, to test that it is run
        // from attribute change steps.
        const script3 = document.createElement('script')
        document.body.append(script2, script3)
        script3.src = './html-fetch-test-9.js'
    </script>
    <!-- Main -->
    <main style="margin: 15px;">
        <p>This is a simple HTML page.<br>It's not example.com, but it's a good start!
        <p>Feel free to explore HTML and add more elements to this page.
    </main>
    <!-- Footer -->
    <footer style="background-color: #f8f9fa; padding: 10px;">
        <p>Copyright &copy; 2024 My Sample Page</p>
    </footer>
</body>
