apps/client/nae/mr:
  stage: build
  variables:
    NAE_TRIGGER: "nae_mr"
  trigger:
    include:
      - apps/client/nae/**/*-ci.yml
    strategy: depend
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/client/nae/**/*
        - bzl/html-app/**/*
        - c8/dom/**/*
        - c8/html-shell/**/*
        - c8/xrapi/**/*
        - WORKSPACE

apps/client/nae/nightly:
  stage: build
  variables:
    NAE_TRIGGER: "nae_nightly"
  trigger:
    include:
      - apps/client/nae/**/*-ci.yml
    strategy: depend
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE == "nae_nightly"

# Add a tag trigger for each app
apps/client/nae/tag/solstice:
  stage: build
  variables:
    NAE_TRIGGER: "nae_release_tag"
  trigger:
    include:
      - apps/client/nae/solstice/**/*-ci.yml
    strategy: depend
  rules:
    - if: $CI_COMMIT_TAG =~ /^nae\/solstice\//
