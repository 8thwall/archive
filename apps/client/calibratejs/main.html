</div>

<div id="cameraFormating">

      <canvas id="overlayView3d" style="display:block" align="center" width="480px" height="640px"></canvas>
  </div>
</div>

    Calibration Info:
  </p>

  <p id = "frameCount">
    Frames: 0/10

  <p id = "resolution">
    Resolution:
  </p>

  <p id = "reprojectionError">
    Reprojection Error: Calculating...
  </p>

  <p id = "focalLength">

  <p id = "boardInfo">
    Board Info:
  </p>
