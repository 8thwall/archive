<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>8th Wall: MRCS Hologram</title>
    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- We've included a slightly modified version of A-Frame, which fixes some polish concerns and adds support for MRCS holograms. -->
    <script src="//cdn.8thwall.com/web/aframe/8frame-0.9.2.min.js"></script>

    <!-- XR Extras - provides utilities like load screen, almost there, and error handling.
         See github.com/8thwall/web/tree/master/xrextras -->
    <script defer src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

    <!-- 8thWall Web - Replace the app key here with your own app key -->
    <script async src="//apps.8thwall.com/xrweb?appKey=XXXXXXXX"></script>

    <!-- IMPORTANT! Contact Microsoft's Mixed Reality Capture Studio at mrcs@microsoft.com to obtain holovideoobject.js. -->
    <!-- <script src='holovideoobject.js'></script> -->

    <!-- A-Frame components -->
    <script src='aframe-components/attach.js'></script>
    <script src='aframe-components/hcap.js'></script>
    <script src='aframe-components/hold-drag.js'></script>
    <script src='aframe-components/pinch-scale.js'></script>
    <script src='aframe-components/two-finger-spin.js'></script>

  </head>
  <body>
    <div class="over">
      <span id="promptText">Tap to Place<br>Hologram</span>
    </div>
    
    <a-scene
      xrweb
      xrextras-gesture-detector
      xrextras-almost-there
      xrextras-loading
      xrextras-runtime-error
      renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true;">
    
      <a-camera
        id="camera"
        position="0 10 3"
        raycaster="objects: .cantap"
        cursor="fuse: false; rayOrigin: mouse;">
      </a-camera>
      
      <a-entity
        light="type: directional;
               intensity: 0.8;
               castShadow: true;
               shadowMapHeight:2048;
               shadowMapWidth:2048;
               shadowCameraTop: 10;
               target: #holo;"
        position="0 50 0"
        attach="target: holo"
        shadow>
      </a-entity>
    
      <a-light type="ambient" intensity="1"></a-light>
    
      <!--
        MRCS holograms for demo; Replace this URL with a link to your holo-cap:
        * Bria (contains sound) - url: //cdn.8thwall.com/web/hcap/microsoft-bria/bria.hcap
        * Soccer Player (no sound) - url: //cdn.8thwall.com/web/hcap/microsoft-soccer/soccer.hcap
      -->
      <holo-cap 
        id="holo" 
        src="//cdn.8thwall.com/web/hcap/microsoft-bria/bria.hcap"
        holo-scale="6"
        holo-touch-target="1.65 0.35"
        hold-drag
        two-finger-spin 
        pinch-scale="scale: 6">
      </holo-cap>
      
      <a-entity
        id="ground"
        class="cantap"
        geometry="primitive: box"
        material="shader: shadow; transparent: true; opacity: 0.4"
        scale="1000 2 1000"
        position="0 -1 0"
        shadow="cast: false">
      </a-entity>
    </a-scene>
  </body>
</html>
