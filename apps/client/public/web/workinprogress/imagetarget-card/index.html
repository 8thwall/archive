<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=0.75, user-scalable=yes">
  <title>8th Wall Web: A-Frame Image Targets</title>
  <link rel="stylesheet" type="text/css" href="index.css">

  <script src="//cdn.8thwall.com/web/aframe/8frame-0.8.2.min.js"></script>

  <!-- XR Extras - provides utilities like load screen, almost there, and error handling.
         See github.com/8thwall/web/tree/master/xrextras -->
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="https://unpkg.com/aframe-text-geometry-component@0.5.1/dist/aframe-text-geometry-component.min.js"></script>

  <!-- 8thWall Web - Replace the app key here with your own app key -->
  <script async src="//apps.8thwall.com/xrweb?appKey=XXXXXXXX"></script>

  <script src="index.js"></script>

  <script>

    AFRAME.registerComponent('image-target', {
      init: function () {
        const detectedImageObjects = {}

        const imageFound = (event) => {
          imageUpdated(event)
        }

        const imageUpdated = (event) => {
          const img = event.detail
          const p = img.position
          const q = img.rotation

          // console.log('imageUpdating ' + img.id)

          const detectedImageObject = this.el.object3D
          detectedImageObject.position.set(p.x, p.y, p.z)
          detectedImageObject.quaternion.set(q.x, q.y, q.z, q.w)
          detectedImageObject.scale.set(img.scale, img.scale, img.scale)
          detectedImageObject.visible = true

          console.log()
        }

        const imageLost = (event) => {
          const detectedImageObject = this.el.object3D
          detectedImageObject.visible = false
        }

        // Add callbacks for image targets.
        XR.addCameraPipelineModule({
          // Camera pipeline modules need a name. It can be whatever you want but must be unique
          // within your app.
          name: 'imagetargets',

          // Listeners are called right after the processing stage that fired them. This guarantees
          // that updates can be applied at an appropriate synchronized point in the rendering
          // cycle.
          listeners: [
            {event: 'reality.imagefound', process: imageFound},
            {event: 'reality.imageupdated', process: imageUpdated},
            // {event: 'reality.imagelost', process: imageLost},
          ],
        })
      }
    })

  </script>
</head>

<body>
  <!-- The image targets -->
  <div class="hidden">
    <img class="xrimage" src="img/pizza-inner.jpg"></img>
  </div>

  <a-scene xrweb xrextras-almost-therea xrextras-loadinga xrextras-runtime-errora xrextras-tap-recentera>

    <a-assets>
      <!-- Credit to Poly by Google for the model: https://poly.google.com/view/fojR5i3h_nh -->
      <a-asset-item id="noodles" src="cupnoodlesCup.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <a-entity light="type: directional;
               intensity: 0.5;" position="1 4.3 2.5">
    </a-entity>

    <!-- 3D text + animations

    "And I really, really like Pizza"
    "Happy Birthday!"-->

    <!-- pizza GLB -->

    <a-light type="ambient" intensity="1.1"></a-light>

    <a-entity image-target>
      <a-entity rotation="90 0 0" position="0 0 0" scale="0.45 0.45 0.45" gltf-model="#noodles"></a-entity>
      <!-- <a-entity text-geometry="value: And I really, really like Pizza; size: 0.2" position="-1.5 0 0" rotation="0 0 0"></a-entity> -->
    </a-entity>

    <!-- <a-box image-target material="color: purple" visible="true"></a-box> -->

  </a-scene>

</body>

</html>
