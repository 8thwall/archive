<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=0.75, user-scalable=yes">
    <title>8th Wall Web: Image Target Cube</title>
    <!-- THREE.js must be supplied -->
    <script src="//cdnjs.cloudflare.com/ajax/libs/three.js/93/three.min.js"></script>

    <!-- XR Extras - provides utilities like load screen, almost there, and error handling.
         See github.com/8thwall/web/tree/master/xrextras -->
    <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

    <!-- 8thWall Web - Replace the app key here with your own app key -->
    <script async src="//apps.8thwall.com/xrweb?appKey=XXXXXXXX"></script>

    <!-- client code -->
    <script src="index.js"></script>
  </head>

  <body>
    <style>
      .hidden {display: none;}
    </style>

    <!-- The AR canvas -->
    <canvas id="camerafeed" width="480" height="640"></canvas>

    <!-- The image targets -->
    <div class="hidden">
      <img class="xrimage" alt="front" src="img/flower-square.png"></img>
      <img class="xrimage" alt="right" src="img/crystal-dew-square.png"></img>
      <img class="xrimage" alt="bottom" src="img/sunglasses-square.png"></img>
    </div>
  </body>
</html>
