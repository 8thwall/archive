<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>8th Wall Web: A-FRAME</title>

    <!-- We've included a slightly modified version of A-Frame, which fixes some polish concerns -->
    <script src="//cdn.8thwall.com/web/aframe/8frame-0.8.2.min.js"></script>
    <script src="//cdn.8thwall.com/web/aframe/aframe-animation-component-5.1.2.min.js"></script>

    <!-- 8thWall Web - Replace the app key here with your own app key -->
    <script async src="//apps.8thwall.com/xrweb?appKey=XXXXXXXXXXXXXXXX"></script>

    <script src="hold-drag.js"></script>
    <script src="gesture-detector.js"></script>
    <script src="two-finger-spin.js"></script>
    <script src="undo-stack.js"></script>
    <script src="color-palette.js"></script>
    <script src="voxel-editor.js"></script>

    <script>
      // Basic example of controlling the loading screen
      AFRAME.registerComponent('loading-screen', {
        init: function() {
          const scene = this.el.sceneEl
          scene.addEventListener('realityready', () => {
            loadingScreen.style.display = 'none'
          })

          scene.addEventListener('realityerror', () => {
            loadingScreen.textContent = 'An error has occurred.'
          })

          scene.addEventListener('camerastatuschange', event => {
            if(event.detail.status == 'failed') {
              loadingScreen.textContent = 'Camera permissions were denied.'
            }
          })
        }
      })
    </script>

    <style>
      body {
        user-select: none;
      }

      * {
        user-select: inherit;
      }

      .palette-default {
        position:absolute;
        background-color: white;
        width:0vmin;
        height:0vmin;
        left: calc(4vmax + 12vmin);
        top: calc(4vmax + 12vmin);
        pointer-events:auto;
        transition: 0.5s;
      }

      .palette-expanded {
        width:45vmin;
        height:45vmin;
      }
    </style>

  </head>
  <body>
    <!-- 2D overlay UI can be done in HTML -->
    <div id="overlay"
         style="position: absolute;
                left: 0;
                top: 0;
                right: 0;
                bottom: 0;
                z-index: 5;
                pointer-events: none;">

      <div style="position:absolute;left:0;right:0;bottom:0;margin: 1.5vmax;display:flex;justify-content:space-between">
        <button id="toggleEraseButton" style="pointer-events:auto;">erase</button>
        <button id="undoButton" style="pointer-events:auto;">undo</button>
        <button id="redoButton" style="pointer-events:auto;">redo</button>
        <input  id="colorPicker"style="pointer-events:auto;" type="color"  value="#00ffff">
      </div>

      <div id="palette" class="palette-default"></div>
      <div id="paletteButton" style="pointer-events:auto;background-color:cyan; position:absolute;width:12vmin;height:12vmin;left: 2vmax;top:2vmax"></div>

      <div id="loadingScreen"
           style="position: absolute;
                  left: 0;
                  right: 0;
                  top: 0;
                  bottom: 0;
                  text-align: center;
                  font-size: 5vh;
                  background-color: white;
                  padding: 5vh;
                  font-family: sans-serif;
                  pointer-events: auto;">
        Loading...
      </div>

    </div>

    <a-scene
      xrweb
      loading-screen
      color-palette
      gesture-detector>

      <a-camera
        id="camera"
        position="0 4 4">
      </a-camera>

      <a-entity
        light="type: directional;
               intensity: 0.8;"
        position="1 4.3 2.5">
      </a-entity>

      <a-light type="ambient" intensity="0.5"></a-light>

      <a-entity
        voxel-editor="debug:false"
        id="voxelBase"
        two-finger-spin
        pinch-scale
        position="0 0.5 0"
        ></a-entity>

      <a-box
        id="ground"
        material="color: #ffffff; transparent: true; opacity: 0"
        scale="1000 2 1000"
        position="0 -1 0">
      </a-box>
    </a-scene>
  </body>
</html>
