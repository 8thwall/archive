<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>8th Wall Web: three.js</title>
    <link rel="stylesheet" type="text/css" href="index.css">

    <!-- THREE.js must be supplied -->
    <script src="//cdnjs.cloudflare.com/ajax/libs/three.js/93/three.min.js"></script>

    <!-- Javascript tweening engine -->
    <script src="//cdnjs.cloudflare.com/ajax/libs/tween.js/16.3.5/Tween.min.js"></script>

    <!-- XR Extras - provides utilities like load screen, almost there, and error handling.
         See github.com/8thwall/web/tree/master/xrextras -->
    <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

    <!-- 8thWall Web - Replace the app key here with your own app key -->
    <script async src="//apps.8thwall.com/xrweb?appKey=<REMOVED_BEFORE_OPEN_SOURCING>"></script>

    <!-- client code -->
    <script src="index.js"></script>
  </head>

  <body>

    <div id="devicemotion">
      Move your phone left and right to keep the box green
      <br/><br/><br/><br/>
      &lt;=&gt;
      <div id="devicebox">
        <div id="device">
          <img src="device.png" />
        </div>
        <div id="live"></div>
      </div>
      <br/><br/><br/><br/><br/>
      Try not to rotate your phone which you move.
    </div>

    <div id="nav">
      <div class="left">
        <button id="reset">Reset Scale</button>
        <button id="clear">Clear Scene</button>
      </div>
      <div class="right">
        <button id="golfball">Golf Ball</button>
        <button id="paper" class="active">Letter Paper</button>
      </div>
    </div>

    <canvas id="camerafeed"></canvas>
    <span id="scale" />
  </body>
</html>
