<!doctype html>
<html>
<head>
  <title>Pioneer - AWE Portal Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="//cdn.8thwall.com/web/aframe/8frame-0.8.2.min.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-animation-component-5.1.2.min.js"></script>

  <script src="//apps.8thwall.com/xrweb?appKey=l36OvwJQpj9CALfJQIahwpceht8jGcNAeeIe4nPdtkG0IERuj4LKY8D9dPGWoAGifirPIB"></script>

  <!-- Common -->
  <link rel="stylesheet" href="https://use.typekit.net/pgp7jlo.css">
  <link href="https://fonts.googleapis.com/css?family=Share+Tech+Mono" rel="stylesheet">
  <link rel="stylesheet" href="/shared/portal.css">
  <link rel="stylesheet" href="/shared/common.css">
  <script src="/shared/portal.js"></script>

  <!-- Individual -->
  <link rel="stylesheet" href="index.css">
  <script src="index.js"></script>
</head>

<body>
  <!-- Loading screen -->
  <div class="loading-container absolute-fill">
    <div class="loading-logos">
      <img class="awe-logo" src="/shared/load-awe.svg" alt="AWE logo">
      <img class="portal-hunt-logo" src="/shared/load-portalhunt.svg" alt="Portal Hunt logo">
    </div>
    <h1 class="portal-title share-tech caps">pioneer</h1>
    <div class="loading-footer">
      <img src="/shared/load-8.svg" alt="8th Wall logo">
    </div>
  </div>

  <div class="relic absolute-center shadowed">
    <div class="relic-loader absolute-center">
      <svg viewBox="0 0 38 38" class="relic-loader-svg">
        <circle class="relic-loader-circle" stroke-dashoffset="100"></circle>
      </svg>
    </div>
    <img class="relic-icon absolute-center" src="/shared/svg/pioneer.svg">
  </div>
  <!-- End loading screen -->

  <div id="overlay" class="absolute-fill share-tech">
    <div class="second-prompt">
      <div id="targetContainer" class="absolute-fill image-fit" style="background-image: url(paradox-bg.jpg)">
        <div id="prompt" class="futura caps">Scan this &darr;</div>
      </div>
    </div>
  </div>

  <a-scene
    antialias="true"
    renderer="sortObjects: true"
    portal-loading
    almost-there="url: 8th.io/pioneer; domain: awe.8thwall.app"
    paradox
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="sky" src="/shared/grad-titanium.png">
      <a-asset-item id="riddleTopModel" src="models/riddleTop.glb"></a-asset-item>
      <a-asset-item id="riddleBottomModel" src="models/riddleBtm.glb"></a-asset-item>
      <a-asset-item id="relicModel" src="/shared/relics/pioneer.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" position="0 4 4"></a-camera>
    <a-light id="directionalLight" type="directional" intensity="2" position="0 1.5 1"></a-light>
  </a-scene>
</body>
</html>
