<!doctype html>
<html>
<head>
  <title>Athena - AWE Portal Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="//cdn.8thwall.com/web/aframe/8frame-0.8.2.min.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-animation-component-5.1.2.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/1.4.5/socket.io.min.js"></script>

  <script src="//apps.8thwall.com/xrweb?appKey=3DmTfXKpBQk30JxJ94BuyxeCjdBmgr90eVZLbMwOXP0iUAkP1copKG91XKcH2bi1T4ehgN"></script>

  <!-- Common -->
  <link rel="stylesheet" href="https://use.typekit.net/pgp7jlo.css">
  <link href="https://fonts.googleapis.com/css?family=Share+Tech+Mono" rel="stylesheet">
  <link rel="stylesheet" href="/shared/portal.css">
  <link rel="stylesheet" href="/shared/common.css">
  <script src="/shared/portal.js"></script>

  <!-- Individual -->
  <link rel="stylesheet" href="index.css">
  <script src="index.js"></script>
  <script src="gesture-detector.js"></script>
  <script src="color-palette.js"></script>
  <script src="voxel-editor.js"></script>
</head>

<body>
  <!-- Loading screen -->
  <div class="loading-container absolute-fill">
    <div class="loading-logos">
      <img class="awe-logo" src="/shared/load-awe.svg" alt="AWE logo">
      <img class="portal-hunt-logo" src="/shared/load-portalhunt.svg" alt="Portal Hunt logo">
    </div>
    <h1 class="portal-title share-tech caps">athena</h1>
    <div class="loading-footer">
      <img src="/shared/load-8.svg" alt="8th Wall logo">
    </div>
  </div>

  <div class="relic absolute-center shadowed">
    <div class="relic-loader absolute-center">
      <svg viewBox="0 0 38 38" class="relic-loader-svg">
        <circle class="relic-loader-circle" stroke-dashoffset="100"></circle>
      </svg>
    </div>
    <img class="relic-icon absolute-center" src="/shared/svg/athena.svg">
  </div>
  <!-- End loading screen -->

  <div id="overlay" class="absolute-fill share-tech">

    <div class="fade-in-on-scan">
      <button id="toggleEraseButton" class="shadowed">placing</button>
      <div id="palette" class="palette-default"></div>
      <div id="paletteButton" class="shadowed"></div>
    </div>

  </div>

  <a-scene
    antialias="true"
    renderer="sortObjects: true"
    portal-loading
    almost-there="requireMotion: true; url: 8th.io/athena; domain: awe.8thwall.app"
    color-palette
    megalith
    gesture-detector
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="voxel-texture" src="rock256.jpg">
      <a-asset-item id="relicModel" src="/shared/relics/athena.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" position="0 4 10"></a-camera>

    <a-light id="ambientLight" type="ambient" intensity="0.5"></a-light>
    <a-light id="directionalLight" type="directional" intensity="1" position="1.5 2.5 0.6"></a-light>
  </a-scene>
</body>
</html>
