<!doctype html>
<html>
<head>
  <title>Gemini - AWE Portal Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="//cdn.8thwall.com/web/aframe/8frame-0.8.2.min.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-animation-component-5.1.2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/1.4.5/socket.io.min.js"></script>

  <script src="//apps.8thwall.com/xrweb?appKey=cq9Df6jSc5dSVRBCgKo493BCJ2WyCRxO22Gtxa3mwhlDCvxGl995pdlsdIapkQPx216BZC"></script>

  <!-- Common -->
  <link rel="stylesheet" href="https://use.typekit.net/pgp7jlo.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Share+Tech+Mono">
  <link rel="stylesheet" href="/shared/portal.css">
  <link rel="stylesheet" href="/shared/common.css">
  <script src="/shared/portal.js"></script>

  <!-- Individual -->
  <script src="index.js"></script>
</head>

<body>
  <!-- Loading screen -->
  <div class="loading-container absolute-fill">
    <div class="loading-logos">
      <img class="awe-logo" src="/shared/load-awe.svg" alt="AWE logo">
      <img class="portal-hunt-logo" src="/shared/load-portalhunt.svg" alt="Portal Hunt logo">
    </div>
    <h1 class="portal-title share-tech caps">gemini</h1>
    <div class="loading-footer">
      <img src="/shared/load-8.svg" alt="8th Wall logo">
    </div>
  </div>

  <div class="relic absolute-center shadowed">
    <div class="relic-loader absolute-center">
      <svg viewBox="0 0 38 38" class="relic-loader-svg">
        <circle class="relic-loader-circle" stroke-dashoffset="100"></circle>
      </svg>
    </div>
    <img class="relic-icon absolute-center" src="/shared/svg/gemini.svg">
  </div>
  <!-- End loading screen -->

  <a-scene
    antialias="true"
    renderer="sortObjects: true"
    portal-loading
    almost-there="url: 8th.io/gemini; domain: awe.8thwall.app"
    reflection
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="sky" src="/shared/grad-dark-red.png">
      <a-asset-item id="emitterBlueModel" src="models/blueEmitter.glb"></a-asset-item>
      <a-asset-item id="emitterRedModel" src="models/redEmitter.glb"></a-asset-item>
      <a-asset-item id="gemModel" src="models/gem.glb"></a-asset-item>
      <a-asset-item id="mirrorModel" src="models/mirrorBody.glb"></a-asset-item>
      <a-asset-item id="surfaceModel" src="models/mirrorSurface.glb"></a-asset-item>
      <a-asset-item id="relicModel" src="/shared/relics/gemini.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" position="0 4 10"></a-camera>

    <a-light id="ambientLight" type="ambient" intensity="0.5"></a-light>
    <a-light id="directionalLight" type="directional" intensity="0.2" position="3 2 0"></a-light>
  </a-scene>
</body>
</html>
