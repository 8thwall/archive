<!doctype html>
<html>
<head>
  <title>Hayabusa - AWE Portal Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="//cdn.8thwall.com/web/aframe/8frame-0.8.2.min.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-animation-component-5.1.2.min.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-extras-4.2.0.min.js"></script>
  <script src="aframe-particle-system-component.js"></script>


  <script src="//apps.8thwall.com/xrweb?appKey=jAEOjd5cMvepRKyBS3mknqFyNoTeYdlbwD3v1cG4SYKCuKDF8M7dy2MCjfTDnPEhuvxF1K"></script>

  <!-- Common -->
  <link rel="stylesheet" href="https://use.typekit.net/pgp7jlo.css">
  <link href="https://fonts.googleapis.com/css?family=Share+Tech+Mono" rel="stylesheet">
  <link rel="stylesheet" href="/shared/portal.css">
  <link rel="stylesheet" href="/shared/common.css">
  <script src="/shared/portal.js"></script>

  <!-- Individual -->
  <link rel="stylesheet" href="index.css">
  <script src="index.js"></script>
  <script src="explosion.js"></script>
</head>

<body>
  <!-- Loading screen -->
  <div class="loading-container absolute-fill">
    <div class="loading-logos">
      <img class="awe-logo" src="/shared/load-awe.svg" alt="AWE logo">
      <img class="portal-hunt-logo" src="/shared/load-portalhunt.svg" alt="Portal Hunt logo">
    </div>
    <h1 class="portal-title share-tech caps">hayabusa</h1>
    <div class="loading-footer">
      <img src="/shared/load-8.svg" alt="8th Wall logo">
    </div>
  </div>

  <div class="relic absolute-center shadowed">
    <div class="relic-loader absolute-center">
      <svg viewBox="0 0 38 38" class="relic-loader-svg">
        <circle class="relic-loader-circle" stroke-dashoffset="100"></circle>
      </svg>
    </div>
    <img class="relic-icon absolute-center" src="/shared/svg/hayabusa.svg">
  </div>
  <!-- End loading screen -->

  <a-scene
    antialias="true"
    xrweb="disableWorldTracking: true"
    portal-loading
    almost-there="url: 8th.io/hayabusa; domain: awe.8thwall.app"
    swarm>

    <a-assets>
      <img id="sky" src="/shared/blue-pink-gradient.png">
      <a-asset-item id="hiveModel" src="models/hive.glb"></a-asset-item>
      <a-asset-item id="treeModel" src="models/tree.glb"></a-asset-item>
      <a-asset-item id="bugModel" src="models/bug.glb"></a-asset-item>
      <a-asset-item id="relicModel" src="/shared/relics/hayabusa.glb"></a-asset-item>
      <img id="cloud" src="images/cloud.png">
      <img id="fx1" src="images/fx1.png">
      <img id="fx2" src="images/fx2.png">
      <img id="fx3" src="images/fx3.png">
    </a-assets>

    <a-camera id="camera" position="0 2 4"></a-camera>

    <a-light id="ambientLight" type="ambient" intensity="0.5"></a-light>
  </a-scene>
</body>
</html>
