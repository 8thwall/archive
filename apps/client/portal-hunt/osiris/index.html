<!doctype html>
<html>
<head>
  <title>Osiris - AWE Portal Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="//cdn.8thwall.com/web/aframe/8frame-0.8.2.min.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-animation-component-5.1.2.min.js"></script>

  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <script src="//apps.8thwall.com/xrweb?appKey=alvJIrpCRrimkmYHaLzY5r3t0Dv45GFHIWt7qhDNBB6hfABfwQpvEh4P6Nk0hPdGNpLVmN"></script>

  <!-- Common -->
  <link rel="stylesheet" href="https://use.typekit.net/pgp7jlo.css">
  <link href="https://fonts.googleapis.com/css?family=Share+Tech+Mono" rel="stylesheet">
  <link rel="stylesheet" href="/shared/portal.css">
  <link rel="stylesheet" href="/shared/common.css">
  <script src="/shared/portal.js"></script>

  <!-- Individual -->
  <script src="/shared/ammo.js"></script>
  <script src="index.js"></script>
  <script src="ConvexObjectBreaker.js"></script>
  <script src="ConvexGeometry.js"></script>
  <script src="QuickHull.js"></script>
</head>

<body>
  <!-- Loading screen -->
  <div class="loading-container absolute-fill">
    <div class="loading-logos">
      <img class="awe-logo" src="/shared/load-awe.svg" alt="AWE logo">
      <img class="portal-hunt-logo" src="/shared/load-portalhunt.svg" alt="Portal Hunt logo">
    </div>
    <h1 class="portal-title share-tech caps">osiris</h1>
    <div class="loading-footer">
      <img src="/shared/load-8.svg" alt="8th Wall logo">
    </div>
  </div>

  <div class="relic absolute-center shadowed">
    <div class="relic-loader absolute-center">
      <svg viewBox="0 0 38 38" class="relic-loader-svg">
        <circle class="relic-loader-circle" stroke-dashoffset="100"></circle>
      </svg>
    </div>
    <img class="relic-icon absolute-center" src="/shared/svg/osiris.svg">
  </div>
  <!-- End loading screen -->
  <a-scene
    antialias="true"
    renderer="sortObjects: true"
    xrextras-gesture-detector
    portal-loading
    almost-there="url: 8th.io/osiris; domain: awe.8thwall.app"
    asteroid
    xrweb="disableWorldTracking: true">

    <a-assets>
      <img id="sky" src="/shared/stars.jpg">
      <a-asset-item id="asteroidModel1" src="/shared/models/asteroid1.glb"></a-asset-item>
      <a-asset-item id="asteroidModel2" src="/shared/models/asteroid2.glb"></a-asset-item>
      <a-asset-item id="asteroidModel3" src="/shared/models/asteroid3.glb"></a-asset-item>
      <a-asset-item id="asteroidModel4" src="/shared/models/asteroid4.glb"></a-asset-item>
      <a-asset-item id="asteroidModel5" src="/shared/models/asteroid5.glb"></a-asset-item>
      <a-asset-item id="asteroidModel6" src="/shared/models/asteroid6.glb"></a-asset-item>
      <a-asset-item id="asteroidModel7" src="/shared/models/asteroid7.glb"></a-asset-item>
      <a-asset-item id="ufoModel" src="models/ufo.glb"></a-asset-item>
      <a-asset-item id="relicModel" src="/shared/relics/osiris.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" position="0 4 5"></a-camera>

    <!-- <a-light id="ambientLight" type="ambient" intensity="0.5"></a-light> -->
    <a-light id="directionalLight" type="directional" intensity="1.5" position="1.5 2.5 0.6"></a-light>
  </a-scene>
</body>
</html>
