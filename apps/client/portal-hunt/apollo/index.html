<!doctype html>
<html>
<head>
  <title>Apollo - AWE Portal Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="//cdn.8thwall.com/web/aframe/8frame-0.8.2.min.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-animation-component-5.1.2.min.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-extras-4.2.0.min.js"></script>

  <script src="//apps.8thwall.com/xrweb?appKey=uN3JJqa7wIKPFhczCfAfUG4Z6Wj7tpVLCXfRyvr9GRDDWxUen554AfV4bUj0Vr7LHg9hep"></script>

  <!-- Common -->
  <link rel="stylesheet" href="https://use.typekit.net/pgp7jlo.css">
  <link href="https://fonts.googleapis.com/css?family=Share+Tech+Mono" rel="stylesheet">
  <link rel="stylesheet" href="/shared/portal.css">
  <link rel="stylesheet" href="/shared/common.css">
  <script src="/shared/portal.js"></script>

  <!-- Individual -->
  <script src="index.js"></script>
</head>

<body>
  <!-- Loading screen -->
  <div class="loading-container absolute-fill">
    <div class="loading-logos">
      <img class="awe-logo" src="/shared/load-awe.svg" alt="AWE logo">
      <img class="portal-hunt-logo" src="/shared/load-portalhunt.svg" alt="Portal Hunt logo">
    </div>
    <h1 class="portal-title share-tech caps">apollo</h1>
    <div class="loading-footer">
      <img src="/shared/load-8.svg" alt="8th Wall logo">
    </div>
  </div>

  <div class="relic absolute-center shadowed">
    <div class="relic-loader absolute-center">
      <svg viewBox="0 0 38 38" class="relic-loader-svg">
        <circle class="relic-loader-circle" stroke-dashoffset="100"></circle>
      </svg>
    </div>
    <img class="relic-icon absolute-center" src="/shared/svg/apollo.svg">
  </div>
  <!-- End loading screen -->

  <a-scene
    antialias="true"
    renderer="sortObjects: true"
    portal-loading
    almost-there="url: 8th.io/apollo; domain: awe.8thwall.app"
    xrweb="disableWorldTracking: true"
    moonlight
    >

    <a-assets>
      <img id="sky" src="/shared/stars.jpg">
      <a-asset-item id="alienModel" src="/shared/models/alien-anim.glb"></a-asset-item>
      <a-asset-item id="relicModel" src="/shared/relics/apollo.glb"></a-asset-item>
      <a-asset-item id="archRock" src="models/archRock.glb"></a-asset-item>
      <a-asset-item id="balanceRock" src="models/balanceRock.glb"></a-asset-item>
      <a-asset-item id="jaggedRock" src="models/jaggedRock.glb"></a-asset-item>
      <a-asset-item id="ground" src="models/ground.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" position="0 4 10"></a-camera>

    <a-light id="ambientLight" type="ambient" intensity="0.1"></a-light>
    <a-light id="directionalLight" type="directional" intensity="0.1" position="1.5 2.5 0.6"></a-light>
  </a-scene>
</body>
</html>
