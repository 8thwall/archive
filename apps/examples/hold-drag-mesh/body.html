<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<a-scene
  xrextras-gesture-detector
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement: true"
  xrweb="allowedDevices: any">

  <!-- We can define assets here to be loaded when A-Frame initializes -->
  <a-assets>
    <!-- Credit to Poly by Google for the model: https://poly.google.com/view/5ZMAz7_ucTn -->
    <a-asset-item id="sandCastleModel" src="assets/sand-castle.glb"></a-asset-item>
    <a-asset-item id="icoSphereModel" src="assets/ico-sphere.glb"></a-asset-item>
  </a-assets>

  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-entity
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 10;
      target: #target;
      shadowRadius: 12"
    xrextras-attach="target: target; offset: 1 15 3;"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.7"></a-light>

  <a-entity 
    id="target" 
    gltf-model="#icoSphereModel" 
    class="cantap" 
    scale="2 2 2" 
    shadow="receive: false">
  </a-entity>

  <a-entity 
    id="model" 
    gltf-model="#sandCastleModel" 
    class="cantap" 
    hold-drag-around-entity="targetId: target"
    position="0 4 0"
    scale="1 1 1" 
    shadow="receive: false">
  </a-entity>
  
  <a-plane
    id="ground" 
    rotation="-90 0 0" 
    width="1000" 
    height="1000" 
    material="shader: shadow" 
    shadow>
  </a-plane>
</a-scene>
