<a-scene 
landing-page
xrextras-loading
xrextras-runtime-error
xrextras-gesture-detector
xrweb="allowedDevices: any"
custom-capture-btn>

  <a-assets>
    <a-asset-item id="astronaut" src="./assets/astronaut.glb"></a-asset-item>
  </a-assets>
  
  <xrextras-capture-button capture-mode="photo"></xrextras-capture-button>
  <xrextras-capture-config request-mic="false"></xrextras-capture-config>
  <xrextras-capture-preview></xrextras-capture-preview>
  
  <a-entity 
    light="
      type: directional; 
      castShadow: true; 
      color: white; 
      intensity: 0.5;
      shadowRadius: 5"
    position="5 10 7">
  </a-entity>

  <a-light type="ambient"></a-light>
  
  <a-camera position="0 2 2"></a-camera>
  
  <a-entity 
    position="0 0 0" 
    gltf-model="#astronaut"
    animation-mixer="clip: floating; loop: repeat"
    xrextras-spin="speed: 50000"
    shadow="receive: false">
  </a-entity>
  
  <a-plane 
    height="2000" 
    width="2000" 
    rotation="-90 0 0" 
    material="shader: shadow; opacity: 0.67" 
    shadow>
  </a-plane>  
</a-scene>
