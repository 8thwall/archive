<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<div id="overlay" style="z-index: 2">
  <img id="recenterBtn" src="assets/reset.svg" />
  <img id="nextBtn" src="assets/arrow-right.svg" />
  <img id="prevBtn" src="assets/arrow-left.svg" />
  <h3>DRAG TO MOVE</h3>
</div>

<!-- Add the tap-place component to the scene so it has an effect -->
<a-scene
  background="color: #000000"
  xrextras-gesture-detector
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="color-management: true"
  xrweb="allowedDevices: any; disableDefaultEnvironment: true"
  splat-switcher>
  <a-assets>
    <a-asset-item id="doty_model" src="assets/doty.glb"></a-asset-item>
  </a-assets>

  <a-camera id="camera" position="0 1.75 2"> </a-camera>

  <a-entity
    light="
      type: directional;
      intensity: 0.9;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      target: #character;
      shadowRadius: 5"
    xrextras-attach="target: character; offset: 8 15 4"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-entity
    id="character"
    character-move
    character-recenter
    gltf-model="#doty_model"
    animation-mixer="clip: idle; loop: repeat; crossFadeDuration: 0.4"
    scale="4.5 4.5 4.5"
    shadow></a-entity>

  <!--a-box
    id="ground"
    scale="1000 2 1000"
    position="0 -1 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box -->
</a-scene>
