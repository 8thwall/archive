<!-- User Interface -->
<div id="jumpZone">
  <button id="circularButton" class="circularButton">A</button>
</div>

<div id="joystickZone">
  <div id="joystickParent" class="joystick-parent">
    <div id="joystickOrigin" class="joystick-origin">
      <div id="joystickPosition" class="joystick-position"></div>
    </div>
  </div>
</div>

<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  responsive-immersive
  renderer="colorManagement: true"
  physics="driver: ammo; debug: false; gravity: 0, -28, 0"
  gltf-model="dracoDecoderPath: https://cdn.8thwall.com/web/aframe/draco-decoder/"
  xrweb="allowedDevices: any; defaultEnvironmentFloorScale: 0.4">
  <!-- assets to be loaded when A-Frame initializes -->
  <a-assets>
    <a-asset-item id="character-model" src="./assets/character-model.glb"></a-asset-item>
    <a-asset-item id="level" src="./assets/level-design.glb"></a-asset-item>
    <a-asset-item id="black-box" src="./assets/black-box.glb"></a-asset-item>
    <a-asset-item id="green-box" src="./assets/green-box.glb"></a-asset-item>
  </a-assets>

  <a-camera id="camera" position="0 14 14"></a-camera>

  <!-- lighting and shadow map targeting character -->
  <a-entity
    light="
      type: directional;
      shadowBias: -0.0001
      intensity: 0.65;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 40;
      shadowCameraBottom: -40;
      shadowCameraRight: 40;
      shadowCameraLeft: -40;
      target: #character;
      shadowRadius: 2"
    xrextras-attach="target: character; offset: 4 15 8"
    position="1 4.3 2.5"
    shadow>
  </a-entity>
  <a-light type="ambient" intensity="0.4"></a-light>

  <!-- Physics Based Character Controller - Dynamic Capsule Body -->
  <a-cylinder
    id="character"
    joystick-controller
    jump-controller
    position="0 5 0"
    height="2"
    material="transparent: true; opacity: 0; depthTest: false"
    ammo-body="type: dynamic; mass: 10; angularFactor: 0 0 0"
    ammo-shape="type: capsule">
    <!-- aniamted character -->
    <a-entity
      id="characterModel"
      gltf-model="#character-model"
      position="0 -2.05 0"
      scale="2.6 2.6 2.6"
      no-cull
      shadow></a-entity>
    <!-- raycaster -->
    <a-entity
      raycaster="objects: .ground; showLine: false; direction: 0 -1 0; far: 2.4"
      position="0 0 0"></a-entity>
  </a-cylinder>

  <!-- Purple Boxes - Static Body (GLB Model)-->
  <a-entity class="ground" gltf-model="#level" scale="3 3 3" physics-object shadow></a-entity>

  <!-- Black Boxes - Kinematic Body (GLB Model)-->
  <a-entity
    class="ground"
    position="6 0.5 -3"
    gltf-model="#black-box"
    shadow
    scale="3 3 3"
    physics-object="body: kinematic; shape: box"
    animation="property: position; from: 6 0.5 -3; to: 6 5.5 -3; dir: alternate; dur: 8000; easing: linear; loop: true">
  </a-entity>

  <a-entity
    class="ground"
    position="-12 0.5 -3"
    gltf-model="#black-box"
    shadow
    scale="3 3 3"
    physics-object="body: kinematic; shape: box"
    animation="property: position; from: -12 0.5 -3; to: -12 11.5 -3; dir: alternate; dur: 7000; easing: linear; loop: true">
  </a-entity>

  <!-- Green Boxes - Dynamic Body (GLB Model)-->
  <a-entity
    class="ground"
    position="4.5 8 -7.5"
    gltf-model="#green-box"
    shadow
    scale="3 3 3"
    physics-object="body: dynamic; shape: hull; mass: 200"></a-entity>

  <a-entity
    class="ground"
    position="6.5 1 2.5"
    rotation="0 45 0"
    gltf-model="#green-box"
    shadow
    scale="3 3 3"
    physics-object="body: dynamic; shape: hull; mass: 200"></a-entity>

  <a-entity
    class="ground"
    position="-12 4 1.7"
    gltf-model="#green-box"
    shadow
    scale="3 3 3"
    physics-object="body: dynamic; shape: hull; mass: 200"></a-entity>

  <!-- Ground - Static Body-->
  <a-box
    class="ground"
    scale="100 2 100"
    position="0 -1 0"
    material="shader: shadow; transparent: true; opacity: 0.3"
    ammo-body="type: static"
    ammo-shape="type: box"
    shadow>
  </a-box>
</a-scene>
