<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->
<div id="overlay" style="z-index: 2">
  <h3>PRESS AND HOLD FOR CHOCOLATE</h3>
</div>

<a-scene
  xrextras-gesture-detector
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement: true"
  gltf-model="dracoDecoderPath: https://cdn.8thwall.com/web/aframe/draco-decoder/"
  physics="driver: ammo; debug: false"
  xrweb>
  <!-- We can define assets here to be loaded when A-Frame initializes -->
  <a-assets>
    <!-- Credit to Poly by Google for the model: https://poly.google.com/view/5ZMAz7_ucTn -->
    <a-asset-item id="blue" src="./assets/blue.glb"></a-asset-item>
    <a-asset-item id="brown" src="./assets/brown.glb"></a-asset-item>
    <a-asset-item id="green" src="./assets/green.glb"></a-asset-item>
    <a-asset-item id="orange" src="./assets/orange.glb"></a-asset-item>
    <a-asset-item id="red" src="./assets/red.glb"></a-asset-item>
    <a-asset-item id="yellow" src="./assets/yellow.glb"></a-asset-item>
  </a-assets>

  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera id="camera" position="0 8 6">
    <a-entity position="0 -1.5 0" id="shooter" projectile-shooter="speed: 12"></a-entity>
  </a-camera>

  <a-entity
    light="
      type: directional;
      shadowBias: -0.0001
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 40;
      shadowCameraBottom: -40;
      shadowCameraRight: 40;
      shadowCameraLeft: -40;
      target: #camera"
    xrextras-attach="target: camera; offset: 8 15 4"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.7"></a-light>

  <a-box
    id="ground"
    scale="1000 2 1000"
    position="0 -1 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow
    ammo-body="type: static"
    ammo-shape="type: box;">
  </a-box>
</a-scene>
