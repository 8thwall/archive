<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<a-scene 
  xrextras-loading
  xrextras-runtime-error
  landing-page
  sky-coaching-overlay
  recenter
  renderer="colorManagement: false"
  xrlayers
  xrweb
  xrconfig>

  <a-assets>
    <!-- Load Hot Air Balloon Model -->
    <a-asset-item id="balloon" src="./assets/models/balloon.glb"></a-asset-item>
     <img id="balloon1" src='./assets/textures/p0.png'>
     <img id="balloon2" src='./assets/textures/p1.png'>
     <img id="balloon3" src='./assets/textures/p2.png'>
     <img id="balloon4" src='./assets/textures/p3.png'>

    <!-- Textures for Remote Authoring -->
    <img id="groundTex" src='./assets/textures/ground.svg'>
    <img id="foreground" src='./assets/textures/foreground.svg'>
  </a-assets>

  <!-- Sky Effects Scene -->
  <a-entity id="skyScene" xrlayerscene="name:sky; invertLayerMask:false; edgeSmoothness:0.6" hide-overlay>
    <!-- Sky Scene Hot Air Balloon -->
    <a-box
      id="skyBalloon"
      animate-balloon
      height="3"
      width="5"
      depth="0.5"
      material="src:#balloon1"
      position="0 -7 -13" 
      scale="1 1 1"
      shadow>
    </a-box>

      <a-box
      id="skyBalloon"
      animate-balloon2
      height="3"
      width="5"
      depth="0.5"
      rotation="0 45 0"
      material="src:#balloon2"
      position="-3 -7 -15" 
      scale=".9 .9 .9"
      shadow>
    </a-box>
      <a-box
      id="skyBalloon"
      animate-balloon3
      height="3"
      width="5"
      depth="0.5"
       rotation="0 -45 0"
      material="src:#balloon3"
      position="3 -7 -13" 
       scale=".9 .9 .9"
      shadow>
    </a-box>
      <a-box
      id="skyBalloon"
      animate-balloon4
      height="3"
      width="5"
      depth="0.5"
      rotation="15 0 0"
      material="src:#balloon4"
      position="0 -7 -13" 
     scale=".9 .9 .9"
      shadow>
    </a-box>

    <!-- Ambient and Directional Light with shadows for the Sky Scene -->
    <a-entity light="type: ambient; intensity: 0.75;"></a-entity>
    <a-entity
      id="skyLight"
      light="
        type: directional;
        intensity: 0.8;
        castShadow: true;
        shadowMapHeight: 2048;
        shadowMapWidth: 2048;
        shadowCameraTop: 20;
        shadowCameraBottom: -20;
        shadowCameraRight: 20;
        shadowCameraLeft: -20;
        target: #skyBalloon;
        shadowRadius: 10;"
      position="1 4.3 2.5"
      xrextras-attach="target: skyBalloon; offset: 8 8 4"
      shadow>
    </a-entity>
  </a-entity>

  <!-- World Effects Scene -->

  <!-- Scene Camera for Sky Effects and World Effects Scenes -->
  <a-camera id="camera" wasd-controls-enabled="false" position="0 3 0"></a-camera>

  <!-- Ambient and Directional Light with shadows for the World Scene (consistent with sky scene lighting) -->
  <a-entity light="type: ambient; intensity: 0.75;"></a-entity>
  <a-entity
    id="light"
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight: 2048;
      shadowMapWidth: 2048;
      shadowCameraTop: 20;
      shadowCameraBottom: -20;
      shadowCameraRight: 20;
      shadowCameraLeft: -20;
      target: #camera;
      shadowRadius: 10;"
    position="1 4.3 2.5"
    xrextras-attach="target: camera; offset: 8 8 4"
    shadow>
  </a-entity>

  <!-- Ground Plane to catch shadows -->
  <a-box
    id="ground"
    scale="2000 2 2000"
    position="0 -1 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box> 
</a-scene>
