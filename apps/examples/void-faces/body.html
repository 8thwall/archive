<a-scene 
  xrextras-almost-there
  xrextras-loading
  xrextras-runtime-error
  xrface="mirroredDisplay: true; meshGeometry: face; cameraDirection: front; allowedDevices: any">
  
  <a-camera position="0 1 2"></a-camera>

  <!-- OBJECT 1 -->
  
  <a-entity
    id="object-1"
    void-face-translate="offset: 0; startOrder: first"
    position="0 -5 0"
    animation="
    startEvents: first;
    property: position;
    from: 0 -4 0;
    to: 0 3 0; 
    loop: false;
    easing: linear;
    dur: 20000">
    
    <a-entity 
    id="face-parent"
    position="0 1.5 -1"
    animation="
    property: rotation;
    to: 0 360 0; 
    loop: true;
    dir: reverse;
    easing: linear;
    dur: 10000">
        
      <xrextras-face-mesh 
        position="0 0 0.25"
        rotation="0 180 0"
        material="
          shader: flat-disco;
          random: -0.3;
          side: double"
      ></xrextras-face-mesh>
      
      <xrextras-face-mesh 
        position="0 0 -0.25"
        material="
          shader: flat-disco;
          random: 0.3;
          side: double"
      ></xrextras-face-mesh>
