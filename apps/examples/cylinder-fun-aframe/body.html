<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->
 
<a-scene
  xrextras-gesture-detector
  xrextras-almost-there
  xrextras-loading
  xrextras-runtime-error
  xrweb="disableWorldTracking: true; allowedDevices: any;"
  bind__xrextras-override-image-targets="names: targetName">

  <a-assets>
    <!-- Credit to Poly by Google for the model: https://poly.google.com/view/dA5osnS0Rzj -->
    <a-asset-item id="jelly-glb" src="assets/jellyfish-model.glb"></a-asset-item>
    <img id="jelly-thumb" src="assets/video-thumbnail.jpg">
    <video
      id="jelly-video"
      autoplay
      muted
      crossorigin="anonymous"
      loop="true"
      src="assets/jellyfish-video.mp4">
    </video>
  </a-assets>

  <!-- Note: The size is only correct for this camera position with respect to the scene -->
  <a-camera
    position="0 1 1"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

  <a-light type="ambient" intensity="1"></a-light>

  <!-- Note: "name:" must be set to the name of the image target uploaded to the 8th Wall Console -->
  <!-- Note: "bind__:" will replace targetName with the value defined in app.js -->
  <!-- xrextras-curved-mesh has to be after xrextras-play-video -->
  <a-entity bind__xrextras-named-image-target="name: targetName" 
    xrextras-play-video="video: #jelly-video; thumb: #jelly-thumb; canstop: true"
    bind__xrextras-curved-mesh="name: targetName; geometry: targetGeometry"
    >
  </a-entity>
  
  <xrextras-capture-button></xrextras-capture-button>
  <xrextras-capture-preview></xrextras-capture-preview>

</a-scene>
