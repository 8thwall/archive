<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<!-- We must add the shoot-tomato component to the scene so it has an effect, as well as the physics component -->
<a-scene
  shoot-tomato
  physics="iterations: 1"
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement: true"
  xrweb="allowedDevices: any">

  <!-- We can define assets here to be loaded when A-Frame initializes -->
  <a-assets>
    <a-asset-item id="tomatoModel" src="assets/tomato.glb"></a-asset-item>
    <a-asset-item preload="auto" class="a-sound" id="splatSrc" src="assets/splat.m4a" response-type="arraybuffer"></a-asset-item>
  </a-assets>

  <a-camera
    id="camera"
    position="0 4 4">
    <a-sound id="splat" src="#splatSrc"></a-sound>
  </a-camera>

  <a-entity
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 20;
      shadowCameraBottom: -20;
      shadowCameraRight: 20;
      shadowCameraLeft: -20;
      target: #camera"
    xrextras-attach="target: camera; offset: 0 15 0"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <!-- Adding the static-body component allows the ground to be collided with -->
  <a-box
    id="ground"
    static-body
    scale="1000 2 1000"
    position="0 -1 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>
