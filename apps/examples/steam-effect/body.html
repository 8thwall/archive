<a-scene
  xrextras-gesture-detector
  landing-page
  add-videos
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement: true"
  xrweb="allowedDevices: any">
  <a-assets>
    <a-asset-item id="pieModel" src="assets/pie-half.glb"></a-asset-item>

    <video
      id="alpha-video"
      playsinline
      muted
      crossorigin="anonymous"
      src="./assets/steam-1.mp4#t=0.001"></video>

    <video
      id="alpha-asdf"
      playsinline
      muted
      crossorigin="anonymous"
      src="./assets/steam-2.mp4#t=0.001"></video>
  </a-assets>

  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera
    id="camera"
    position="0 4 4"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-entity
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 10;
      target: #model;
      shadowRadius: 12"
    xrextras-attach="target: model; offset: 1 15 3;"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.7"></a-light>

  <a-entity
    id="model"
    gltf-model="#pieModel"
    class="cantap"
    xrextras-hold-drag
    xrextras-two-finger-rotate
    xrextras-pinch-scale
    scale="2 2 2"
    rotation="0 -45 0"
    shadow="receive: false">
  </a-entity>

  <a-plane
    id="ground"
    rotation="-90 0 0"
    width="1000"
    height="1000"
    material="shader: shadow"
    shadow>
  </a-plane>
</a-scene>
