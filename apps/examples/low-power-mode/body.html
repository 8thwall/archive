<h2
  id="message"
  style="
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
    z-index: 1;
    color: #39c139;
    font-family: sans-serif;
    width: 80vw;
    text-align: center;
    text-shadow: 0 0 3px black;
  ">
  Low Power Mode: Disabled 🔋
</h2>

<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrextras-gesture-detector
  xrweb="allowedDevices: any">
  <a-assets>
    <video id="vid" src="./assets/purple-ink.mp4#t=0.001" muted loop></video>
  </a-assets>

  <a-entity
    light="
      type: directional; 
      castShadow: true; 
      color: white; 
      intensity: 0.5"
    position="5 10 7">
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-camera
    position="0 2 2"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;"></a-camera>

  <a-plane position="0 2 0" src="#vid" class="cantap" low-power-mode></a-plane>

  <a-plane
    height="2000"
    width="2000"
    rotation="-90 0 0"
    material="shader: shadow; opacity: 0.67"
    shadow>
  </a-plane>
</a-scene>
