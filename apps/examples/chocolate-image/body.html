<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  gltf-model="dracoDecoderPath: https://cdn.8thwall.com/web/aframe/draco-decoder/"
  renderer="colorManagement: true; webgl2: true"
  xrweb="disableWorldTracking: true">
  <a-assets>
    <a-asset-item id="hider-model" src="assets/hider.glb"></a-asset-item>
    <a-asset-item id="billboard-model" src="assets/test.glb"></a-asset-item>
    <a-asset-item id="background-model" src="assets/background2.glb"></a-asset-item>
    <video
      id="portal-video"
      muted
      autoplay
      playsinline
      crossorigin="anonymous"
      loop="true"
      src="./assets/portal-video.mp4"></video>
  </a-assets>

  <a-camera></a-camera>

  <a-light type="ambient" intensity="0.8"></a-light>

  <a-entity image-target-portal="name: billboard">
    <a-entity
      light="
      type: directional;
      shadowBias: -0.0001
      intensity: 0.65;
      castShadow: true;
      shadowMapHeight:4096;
      shadowMapWidth:4096;
      shadowCameraTop: 10;
      shadowCameraBottom: -10;
      shadowCameraRight: 10;
      shadowCameraLeft: -10;
      target: #model"
      xrextras-attach="target: model; offset: 8 15 4"
      position="1 4.3 2.5"
      shadow>
    </a-entity>

    <a-entity
      position="0 0 0"
      gltf-model="#hider-model"
      my-hider-material
      scale="0.395 0.395 0.395">
    </a-entity>

    <a-entity
      position="0 0 0"
      gltf-model="#background-model"
      scale="0.395 0.395 0.395">
    </a-entity>

    <a-entity
      id="model"
      position="0 0 0"
      gltf-model="#billboard-model"
      reflections="type: realtime"
      scale="0.395 0.395 0.395"
      no-cull
      shadow>
    </a-entity>
