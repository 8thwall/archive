<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<a-scene
  xrextras-gesture-detector
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrweb="disableWorldTracking: true;">

  <a-assets>
    <img id="thumbnail" src="assets/thumbnail.png">
    <video
      id="forest-video"
      muted
      autoplay
      playsinline
      crossorigin="anonymous"
      loop="true"
      src="./assets/forest-video.mp4">
    </video>
  </a-assets>

  <a-camera
    position="0 4 10"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

  <a-light type="ambient" intensity="1"></a-light>

  <!-- Note: "name:" must be set to the name of the image target uploaded to the 8th Wall Console -->
  <xrextras-named-image-target name="video-target">
    <a-entity
      play-video="video: #forest-video; thumb: #thumbnail; canstop: true;"
      geometry="primitive: plane; height: 1; width: 0.75;"
      material="transparent: true">
    </a-entity>
  </xrextras-named-image-target>
  <!-- Note: If chanigng primitive height/width make sure to do so in target-video.js as well -->

</a-scene>
