<a-scene 
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrextras-pause-on-hidden
  xrface="mirroredDisplay: true;  meshGeometry: eyes, face, mouth; cameraDirection: front; allowedDevices: any;">
  
  <a-assets>
    <a-asset-item id="head-occluder" src="./assets/Models/head-occluder.glb"></a-asset-item>
    <a-asset-item id="mask" src="./assets/Models/samurai-mask.glb"></a-asset-item>
  </a-assets>

  <a-camera look-controls="enabled: false" wasd-controls="enabled: false" position="0 1.6 0"></a-camera>

  <xrextras-capture-button></xrextras-capture-button>
  <xrextras-capture-preview></xrextras-capture-preview>
    
  <xrextras-faceanchor>
    
    <a-entity id="face" gltf-model="#head-occluder" position="0 0 0.02" xrextras-hider-material></a-entity>
    
    <xrextras-face-attachment point="mouth">
      <a-entity 
      gltf-model="#mask" 
      reflections="type: realtime"
      rotation="0 -180 0" 
      scale="0.8 0.8 0.8" 
      position="0 0.23 0.55"></a-entity>
    </xrextras-face-attachment>
    
  </xrextras-faceanchor>
  
  <a-light type="directional" xr-light target="#face" position="0 1.8 3"></a-light>
  <a-light type="ambient" xr-light></a-light>
  
</a-scene>
