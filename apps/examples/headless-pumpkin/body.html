<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->
<a-scene
  tap
  xrextras-gesture-detector
  xrextras-almost-there
  xrextras-loading
  xrextras-runtime-error
  xrweb="disableWorldTracking: true">
  
  <a-assets>
    <a-asset-item id="headless" src="./assets/models/headless.glb"></a-asset-item>
    <a-asset-item id="glasses" src="./assets/models/glasses.glb"></a-asset-item>
    
    <a-asset-item id="plant" src="./assets/models/plant.glb"></a-asset-item>

    <a-asset-item id="pumpkin" src="./assets/models/pumpkin.glb"></a-asset-item>

    <a-asset-item id="root" src="./assets/models/root.glb"></a-asset-item>

  </a-assets>

  <a-camera
    position="0 1 1"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

  <a-light type="ambient" intensity="1"></a-light>
  
  <!-- FRONT LABEL: 3D model inside generated container geometry -->
  
  <a-entity curved-target-container="name: 19Crime;"></a-entity><!-- Generates container geo -->
 
  <a-entity curved-image-target="name: 19Crime; geometry: none;"><!-- Content inside container -->
  <a-entity position="-0.2 0 -1">
    <a-entity class="cantap" gltf-model="#headless" position="0.5 0 0.8" scale="15 15 15"></a-entity>
    <a-entity id="gl" visible="false"  gltf-model="#glasses" position="0.411 0.297 1.06" rotation="-41.232 -34.412 -26.349" scale="0.004 0.004 0.004"></a-entity>
    
    <a-entity id="pl" visible="false" position="0.2 0 0.07">
      <a-entity gltf-model="#plant" position="0.175 0.18 1.3" scale="1 1 1"></a-entity>
      <a-entity gltf-model="#pumpkin" position="0.12 0.2 1.3" rotation="0 0 -20.63" scale="0.037 0.037 0.037"></a-entity>
      <a-entity gltf-model="#root" position="0.25 0.218 1.3" rotation="42 0 0" scale="0.003 0.003 0.003"></a-entity>
    </a-entity>
    
  </a-entity>

    <a-text id="tx" visible="false" align="center" position="0 -0.5 0.4" width="2" value="Rotate coffee ->"></a-text>
  </a-entity>

  <!-- BACK LABEL: video material on generated label geometry -->
  
  <a-entity curved-target-video="name: back-label-beta; video: #jelly-video; thumb: #jelly-thumb;">
  </a-entity>

</a-scene>
