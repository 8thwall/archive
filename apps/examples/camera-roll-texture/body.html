<div id="overlay">
  <label for="file" class="custom-upload">Select Image</label>
  <input id="file" type="file" name="filename" accept="image/*">
</div>

<a-scene
  camera-roll-texture
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
  xrweb>

  <a-camera
    id="camera"
    position="0 8 0">
    <a-entity id="offset" position="0 0 -7.5"></a-entity>
  </a-camera>

  <a-light type="ambient" intensity="0.5"></a-light>
  
</a-scene>
