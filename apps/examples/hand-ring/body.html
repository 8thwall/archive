<a-scene
  landing-page
  xrextras-loading
  gltf-model="dracoDecoderPath: https://cdn.8thwall.com/web/aframe/draco-decoder/"
  xrextras-runtime-error
  hand-coaching-overlay
  xrhand="allowedDevices:any; cameraDirection:back;"
>
  <!-- 3D models, images, videos -->
  <a-assets>
    <a-asset-item
      id="diamondModel"
      src="./assets/diamondRotated.glb"
    ></a-asset-item>
    <a-asset-item id="bandModel" src="./assets/bandRotated.glb"></a-asset-item>
    <a-asset-item
      id="simpleBandModel"
      src="./assets/simpleBand.glb"
    ></a-asset-item>
    <a-asset-item
      id="engagementModel"
      src="./assets/engagementRotated.glb"
    ></a-asset-item>
    <a-asset-item
      id="signetModel"
      src="./assets/signetQuart.glb"
    ></a-asset-item>
    <a-asset-item id="luxWatchModel" src="./assets/luxWatch.glb"></a-asset-item>
    <a-asset-item
      id="slenderWatchModel"
      src="./assets/slenderWatch.glb"
    ></a-asset-item>
  </a-assets>

  <a-camera
    look-controls="enabled: false"
    wasd-controls="enabled: false"
    position="0 2 0"
  ></a-camera>

  <!-- content anchored to face -->
  <xrextras-hand-anchor id="hand">
    <!-- <xrextras-hand-mesh wireframe="true"></xrextras-hand-mesh> -->

    <xrextras-hand-occluder
      show="false"
      adjustment="0.003"
    ></xrextras-hand-occluder>

    <xrextras-hand-attachment point="ringLower">
      <a-entity
        gltf-model="#diamondModel"
        position="0 -0.008 0"
        rotation="-8 0 -15"
        reflections="type:static"
        change-map="color:gold;"
        scale="1 1 1"
        scale-to-hand="size:16; adjustment:0.81"
      ></a-entity>
      <!-- GOOD but have to make occluder smaller -->
      <!-- <a-entity

      <!-- <a-entity

        reflections="type:static"

    <xrextras-hand-attachment point="wrist">
      <!-- GOOD -->
      <a-cylinder
        id="wristOccluder"
        color="#FAFAFA"
        scale="1 1 1"
        position=".00005 -0.055 .003"

  <a-light
    type="directional"
    target="#hand"
    position="0 1.8 3"
    intensity="0.8"
  ></a-light>
  <a-light type="ambient" intensity="0.8"></a-light>
