<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->
<div id="orientationOverlay">
  <div id="message">
    <img src="./assets/rotate.svg" width="100px" />
    Please rotate the phone to portrait mode for a better experience.
  </div>
</div>

<a-scene
  xrextras-loading
  xrextras-runtime-error
  landing-page
  sky-coaching-overlay
  sky-recenter
  renderer="colorManagement: true"
  xrlayers
  device-orientation>
  <a-assets>
    <img id="skyTexture" src="./assets/space.png" />
  </a-assets>

  <a-camera wasd-controls-enabled="false" position="0 3 0"></a-camera>

  <a-entity id="skyScene" xrlayerscene="name:sky; invertLayerMask:false; edgeSmoothness:0.6">
    <a-sky material="src: #skyTexture; transparent: true; opacity: 1; fog:false;"></a-sky>

    <a-box
      position="0 10 -10"
      scale="5 5 5"
      material="
        color: #AD50FF; shader: flat; 
        src: https://cdn.8thwall.com/web/assets/cube-texture.png"
      shadow>
    </a-box>

    <a-entity light="type: ambient; intensity: 1;"></a-entity>
  </a-entity>
</a-scene>
