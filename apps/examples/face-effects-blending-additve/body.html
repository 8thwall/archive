<a-scene 
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrextras-pause-on-hidden
  renderer="maxCanvasWidth: 960; maxCanvasHeight: 960"
  xrface="mirroredDisplay: true;  meshGeometry: eyes, face, mouth; cameraDirection: front; allowedDevices: any;">
  
  <a-assets>
    <video
      id="laser-video"
      playsinline
      muted
      crossorigin="anonymous"
      loop="true"
      src="./assets/Textures/color-laser.mp4#t=0.001">
    </video>
    <video
      id="laser-video2"
      playsinline
      muted
      crossorigin="anonymous"
      loop="true"
      src="./assets/Textures/blue-laser.mp4#t=0.001">
    </video>
    <a-asset-item id="head-occluder" src="./assets/Models/head-occluder.glb"></a-asset-item>
  </a-assets>
  
  <xrextras-resource id="purple-mask" src="./assets/Textures/purple-mask.png"></xrextras-resource>
  <xrextras-resource id="alpha" src="./assets/Alpha/soft-eyes-mouth.png"> </xrextras-resource>
  <xrextras-basic-material id="mask" tex="#purple-mask" alpha="#alpha" opacity="0.9"></xrextras-basic-material>
  
  <xrextras-capture-button></xrextras-capture-button>
  <xrextras-capture-preview></xrextras-capture-preview>

  <a-camera look-controls="enabled: false" wasd-controls="enabled: false" position="0 1.6 0"></a-camera>
  
  <xrextras-faceanchor>
    
    <a-entity gltf-model="#head-occluder" position="0 0 0.03" xrextras-hider-material></a-entity>

    <xrextras-face-mesh material-resource="#mask"></xrextras-face-mesh>
    
    <xrextras-face-attachment point="leftEye">
      <a-cylinder 
       scale=".05 7 .06" 
       position="0 0 -2.5"
       rotation="90 0 0"
       auto-play-video="video: #laser-video"
       material="shader: flat; src: #laser-video; blending: additive; side: double; repeat: .9 .9">
      </a-cylinder>
    </xrextras-face-attachment>

    <xrextras-face-attachment point="rightEye">
      <a-cylinder 
       scale=".05 7 .06" 
       position="0 0 -2.5"
       rotation="90 0 0"
       auto-play-video="video: #laser-video"
       material="shader: flat; src: #laser-video; blending: additive; side: double; repeat: .9 .9">
      </a-cylinder>
    </xrextras-face-attachment>

     <xrextras-face-attachment point="leftEye">
      <a-cylinder 
      scale=".065 7 .065" 
      position="0 0 -2.5"
      rotation="90 0 0"
      auto-play-video="video: #laser-video2"
      material="shader: flat; src: #laser-video2; blending: additive; side: front; transparent: true; opacity: 0.6">
      </a-cylinder>
    </xrextras-face-attachment>

      <xrextras-face-attachment point="rightEye">
      <a-cylinder 
      scale=".065 7 .065" 
      position="0 0 -2.5"
      rotation="90 0 0"
      auto-play-video="video: #laser-video2"
      material="shader: flat; src: #laser-video2; blending: additive; side: front; transparent: true; opacity: 0.6">
      </a-cylinder>
    </xrextras-face-attachment>

  </xrextras-faceanchor>
  
  <a-light type="directional" target="#face" position="0 1.8 3" intensity="0.8"></a-light>
  <a-light type="ambient" intensity="0.8"></a-light>
  
</a-scene>
