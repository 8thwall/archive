<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrextras-gesture-detector
  xrweb="allowedDevices: any"
  renderer="colorManagement:true">
  <a-assets>
    <a-asset-item id="chair" src="assets/chair1.glb"></a-asset-item>
  </a-assets>

  <a-entity
    light="
      type: directional; 
      castShadow: true; 
      color: white; 
      intensity: 0.5"
    position="5 10 7">
  </a-entity>

  <a-light type="ambient" intensity="0.7"></a-light>

  <a-camera
    voxel-generator="voxelSize: 0.1; noiseFactor: 0.05; radius:.3;"
    position="0 2 2"></a-camera>

  <a-entity
    xrextras-one-finger-rotate
    id="chairEntity"
    gltf-model="#chair"
    position="0 0 0"
    scale="1 1 1"
    shadow="receive:false;">
  </a-entity>

  <!-- <a-plane
    height="2000"
    width="2000"
    depth=".002"
    rotation="-90 0 0"
    material="shader: shadow; opacity: 0.67"
    shadow>
  </a-plane> -->

  <a-plane
    height="2000"
    width="2000"
    rotation="-90 0 0"
    material="opacity: 0; transparent: true"
    class="ground"></a-plane>
</a-scene>
