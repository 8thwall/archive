<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrweb="allowedDevices: any">

  <!-- We can define assets here to be loaded when A-Frame initializes -->
  <a-assets>
    <img id="imageFile" src="./assets/trees.jpg">
    <a-asset-item id="cowboyModel" src="./assets/cowboy.glb"></a-asset-item>
  </a-assets>

  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera
    position="0 2 0"
    raycaster="objects: .cantap"
    cursor="
      fuse: false;
      rayOrigin: mouse;">
  </a-camera>
  
  <a-entity class="cantap" tex-swap gltf-model="#cowboyModel" position="0 0 -3"></a-entity>

</a-scene>
