<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<div id="overlay">
  <div id="label"><h2>Point Size</h2></div>
  <input id="sizeSelect" class="slider" type="range" min="1" max="20" value="6" step="0.5">
</div>

<a-scene
  xrextras-gesture-detector
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrweb="allowedDevices: any">

  <a-camera 
    id="camera" 
    position="0 8 8">
  </a-camera>

  <a-light type="ambient" intensity="1.0"></a-light>

  <ply-model
    src="./assets/tree.ply" 
    mesh="false"
    size="0.06"
    scale="4 4 4"
    position="0 0 0"
    size-select
    xrextras-two-finger-rotate
    xrextras-pinch-scale
  ></ply-model>

</a-scene>
