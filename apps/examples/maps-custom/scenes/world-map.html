<!-- 
WORLD MAP SCENE
Niantic-style map scene where you walk in the real world 
to different Wayspots to launch a procedural VPS experience
-->

<a-scene
  focused-wayspot
  map-loading-screen
  renderer="color-management:true"
  fog="color: white; type: exponential; density: 0.018;"
  gltf-model="draco-decoder-path: https://cdn.8thwall.com/web/aframe/draco-decoder/">

  <a-assets>
    <a-asset-item id="doty-model" src=".././assets/map-assets/doty.glb"></a-asset-item>
    <a-asset-item id="rpm-model" src=".././assets/map-assets/rpm.glb"></a-asset-item>
    <a-asset-item id="poi-model" src=".././assets/map-assets/poi-disc.glb"></a-asset-item>
    <img id="clouds" src=".././assets/map-assets/clouds.jpg">
  </a-assets>

  <!-- materials for custom map themes -->
  <a-entity id="land-mat" material="color: white"></a-entity>
  <a-entity id="building-mat" material="color: white"></a-entity>
  <a-entity id="park-mat" material="color: white"></a-entity>
  <a-entity id="parking-mat" material="color: white"></a-entity>
  <a-entity id="road-mat" material="color: white"></a-entity>
  <a-entity id="transit-mat" material="color: white"></a-entity>
  <a-entity id="sand-mat" material="color: white"></a-entity>
  <a-entity id="water-mat" material="color: white"></a-entity>

  <div id="gradient" class="gradient-move absolute-fill">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%)">
      <div class="spinner"></div>
    </div>
  </div>
  <img id="poweredby" src="https://cdn.8thwall.com/web/img/almostthere/v2/poweredby-horiz-white-4.svg">

  <div id="ui-section">
    <h3 id="wayspot-title"></h3>
    <span>
      <img src=".././assets/map-assets/walk-icon.svg">
      <p id="wayspot-distance"></p>
      <button id="start-btn">Start AR</button>
    </span>
  </div>

  <div id="theme-switcher">
    <span>
      <img id="prev-btn-wthr" src=".././assets/theme-assets/arrow-left.svg">
      <img id="wthr-icon" src=".././assets/theme-assets/sun.svg">
      <img id="next-btn-wthr" src=".././assets/theme-assets/arrow-right.svg">
      
      <img id="prev-btn-char" src=".././assets/theme-assets/arrow-left.svg">
      <img id="char-icon" src=".././assets/theme-assets/doty-fill.svg">
      <img id="next-btn-char" src=".././assets/theme-assets/arrow-right.svg">
    </span>
    <span>
      <img id="prev-btn" src=".././assets/theme-assets/arrow-left.svg">
      <h3 id="theme-title">THEME NAME</h3>
      <img id="next-btn" src=".././assets/theme-assets/arrow-right.svg">
    </span>
  </div>

  <a-entity
    light="
      type: directional;
      intensity: 0.3;
      cast-shadow: true;
      shadow-map-height: 2048;
      shadow-map-width: 2048;
      shadow-camera-top: 15;
      shadow-camera-bottom: -15;
      shadow-camera-left: -15;
      shadow-camera-right: 15;
      shadow-radius: 4;
      target: #character;"
    position="0 10 0"
    shadow>
  </a-entity>
  
  <a-light type="ambient" intensity="0.8"></a-light>
  
  <a-camera 
    near="1" 
    far="200"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;"
    wasd-controls="enabled: false"
    lightship-map-controls="target: 0 3 0; min-distance: 5.5; max-distance: 25;">
  </a-camera>

  <a-sky 
    id="outer-sky"
    radius="100" 
    material="
      shader: lightship-map-sky-gradient; 
      topColor: #73E8F9;
      exponent: 0.65"
  ></a-sky>
  <a-sky 
    id="inner-sky"
    radius="90" 
    xrextras-spin="speed: 500000" 
    material="
      shader: standard;
      src: #clouds; 
      transparent: true; 
      repeat: 4 4;
      opacity: 0.25;"
  ></a-sky>

  <a-entity 
    id="rain-particles" 
    visible="false"
    position="0 16 0" 
    particle-system="
      preset: rain; 
      texture: https://static.8thwall.app/assets/drop-jsdd7nc3zb.png;
      particleCount: 2000; 
      blending: 2; 
      maxAge: 1.5; 
      size: 0.5;
      opacity: 0.4; 
      velocitySpread: 0 50 0;
      velocityValue: 10 30 5;
      positionSpread: 50 20 50;"
  ></a-entity>

  <a-entity 
    id="snow-particles" 
    visible="false"
    position="0 16 0" 
    particle-system="
      preset: snow; 
      maxAge: 6;
      particleCount: 3000; 
      size: 0.5;
      velocityValue: 0 4 0;
      positionSpread: 50 20 50;"
  ></a-entity>

  <a-plane 
    scale="100 100 1"
    rotation="-90 0 0"
    position="0 0.01 0" 
    material="shader: shadow" 
    shadow="cast: false; receive: true;"
  ></a-plane>

  <a-toon-ocean 
    active="false"
    repeat="50" 
    position="0 2 0" 
    scale="2 2 0"
    rotation="-90 0 1"
    opacity_shallow="0.8"
  ></a-toon-ocean>

  <lightship-map 
    scale="100 100 100" 

    Zenable-gps="false"
    Zlat-lng="37.79562549032848, -122.39211122962924"
    Zmap-debug-controls
    
    map-theme-switcher
    lightship-map-add-wayspots="primitive: custom-wayspot; meters: 25; min: 0.05;">
    <a-entity
      id="character"
      gltf-model="#doty-model"
      rotation="0 180 0"
      scale="0.1 0.1 0.1"
      lightship-map-motion-direction
      lightship-map-walk-animation="idle: idle; walk: walk; run: walk;"
      shadow
    ></a-entity>
  </lightship-map>

</a-scene>
