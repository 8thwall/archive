<a-scene
    xrextras-gesture-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">
  
    <a-assets>
        <img
            id="pause-frame"
            src="./assets/pause-frame.jpg">
        <video
            id="dino-video"
            muted
            crossorigin="anonymous"
            loop="true"
            src="./assets/dino-vid.mp4">
        </video>
    </a-assets>
    
    <a-camera
        position="0 4 10"
        raycaster="objects: .cantap"
        cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>
    
    <a-light
        type="ambient"
        intensity="1"
    ></a-light>
    
    <a-entity
        target-video="name: video-target; video: #dino-video; thumb: #pause-frame; canstop: true"
        geometry="primitive: plane; height: 1.65; width: 0.75;">
    </a-entity>
</a-scene>
