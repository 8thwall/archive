<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->
<div class="message"></div>

<a-scene
  pool="mixin: laser; size: 10"
  update-pool-message="messageEl: .message"
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement: true; webgl2: true"
  xrweb="allowedDevices: any">
  <!-- We can define assets here to be loaded when A-Frame initializes -->
  <a-assets>
    <a-mixin id="laser" laser></a-mixin>
  </a-assets>

  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera id="camera" position="0 8 8"> </a-camera>

  <a-entity id="ship" position="0 1 -5" spaceship shadow="receive: false"></a-entity>

  <a-entity
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 10;
      target: #model;"
    xrextras-attach="target: ship; offset: 3 15 3;"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.7"></a-light>

  <a-box
    id="ground"
    scale="1000 2 1000"
    position="0 -1 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>
