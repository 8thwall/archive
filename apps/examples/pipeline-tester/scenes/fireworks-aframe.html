<div
  id="launchBtn"
  style="
    width: 5em;
    height: 5em;
    position: relative;
    margin: 0 auto;
    margin-top: 70vh;
    border: 8px solid #888;
    background-color: #555;
    color: white;
    border-radius: 50%;
    z-index: 1;">
</div>
<a-scene
  id='ascene'
  xrextras-almost-there
  xrextras-loading
  xrextras-runtime-error
  launch-btn
  tap-place
  style="z-index: 0"
  renderer="colorManagement:true"
  xrweb="allowedDevices: any; verbose: true;">
  <a-assets>
    <a-asset-item id="poleModel" src="../assets/fireworks/pole.glb"></a-asset-item>
    <a-asset-item id="rocketModel" src="../assets/fireworks/rocket.glb"></a-asset-item>
  </a-assets>
  
  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera
      position="0 8 0"
      raycaster="objects: .cantap"
      cursor="
      fuse: false;
      rayOrigin: mouse;">
  </a-camera>
  
  <a-entity light="type: directional; intensity: 0.8;" position="1 4.3 2.5"></a-entity>
  
  <a-light type="ambient" intensity="0.5"></a-light>
  
  <!-- Adding the cantap class allows the ground to be clicked -->
  <a-entity
    id="ground"
    class="cantap"
    geometry="primitive: box"
    material="color: #333; transparent: true; opacity: 0"
    scale="1000 2 1000"
    position="0 -1 0">
  </a-entity>
</a-scene>
