<!-- NOTE: xrweb is configured in cube-aframe.tsx -->
<a-scene
  id="ascene"
  xr-mesh
  xrextras-almost-there
  xrextras-loading
  xrextras-runtime-error
  xrextras-gesture-detector
  coaching-overlay="promptColor: pink; animationColor: blue; promptText: testing123;"
  xrconfig="allowedDevices: any; verbose: true;"
  xrweb>
  <a-entity hider-material=""></a-entity>

  <a-entity
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;"
    light="type:directional; castShadow:true; color:white; intensity:0.5"
    position="5 10 7"></a-entity>
  <!--coaching-overlay="promptText: throw phone far; promptColor: gray; animationColor: white; disablePrompt: false;"-->
  <a-camera
      id="camera"
      position="0 1 0"
      rotation="0 0 0">
  </a-camera>

  <!--Hack to make xrextras-hold-drag work with an offset-->
  <!--<a-box opacity=0.0 position="0 0 0" xrextras-hold-drag="riseHeight: 0.0;" xrextras-two-finger-rotate>-->
  <a-box opacity="0.0" position="0 0 -2" xrextras-two-finger-rotate>
    <a-box visible="true" position="0 0.5 0" material="color: #AD50FF;" shadow></a-box>
  </a-box>

  <a-plane
    id="ground"
    height="2000"
    width="2000"
    rotation="-90 0 0"
    position="0 0.5 0"
    material="shader: shadow; opacity: 0.67"
    shadow></a-plane>
</a-scene>
