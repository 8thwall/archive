<!-- UI -->
<div id="overlay" class="over">
  <span id="promptText">
    <svg width="100%">
      <text class="svgStroke" x="50%" y="50%" dominant-baseline="middle" text-anchor="middle">Loading...</text>
      <text class="svgText" x="50%" y="50%" dominant-baseline="middle" text-anchor="middle">Loading...</text>
    </svg>
  </span>
  <div id="progressBar">
    <div id="playProgress"></div>
    <div id="loadProgress"></div>
  </div>
  <img id="pauseBtn" src="../assets/mrcs/icons/pause.svg" style="display: none;">
  <img id="muteBtn" src="../assets/mrcs/icons/sound.svg" style="display: none;">
</div>

<a-scene
  id="ascene"
  xrextras-gesture-detector
  xrextras-almost-there
  xrextras-loading
  xrextras-runtime-error
  xrweb="allowedDevices: any; verbose: true;">
  
  <a-camera 
    id="camera" 
    position="0 1.5 2"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <!--
    For inquiries regarding Tetavi volumetric capture services, contact Tetavi at hello@tetavi.com
    
    The Tetavi volumetric video for this demo is located in the assets folder
    * Dancing Couple (contains sound)
      TVM -> ../assets/tetavi/Dancing-Hologram/DancingGeometry.tvm
      MP4 -> ../assets/tetavi/Dancing-Hologram/DancingTexture.mp4
    
    You can upload your own Tetavi volumetric videos by dropping the TVM + MP4 files in the 
    assets folder or Assets + -> Upload...
    
    If you are hosting your own TVM + MP4 files, reference the file links using 'src' below
  -->

  <xrextras-resource id="tvmFile" src="../assets/tetavi/DancingGeometry.tvm"></xrextras-resource>
  <xrextras-resource id="mp4File" src="../assets/tetavi/DancingTexture.mp4"></xrextras-resource>

  <tetavi-hologram
    tvm-file="#tvmFile"
    mp4-file="#mp4File"
    touch-target-size="1.5 0.8"
    touch-target-offset="-0.5 0.5"
    xrextras-hold-drag="riseHeight: 0"
    xrextras-pinch-scale
    xrextras-two-finger-rotate>
  </tetavi-hologram>

   <a-box
    id="ground"
    class="cantap"
    geometry="primitive: box"
    scale="1000 2 1000"
    position="0 -1 0"
    xrextras-hider-material>
   </a-box>
  
</a-scene>
