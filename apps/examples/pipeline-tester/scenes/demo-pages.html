<a-scene
  renderer="antialias:true; webgl2: true;"
  xrextras-almost-there
  xrextras-loading
  xrextras-runtime-error
  masters
  xrweb="disableWorldTracking: true; allowedDevices: any; verbose: true;">

  <a-camera id="camera" position="0 4 10"></a-camera>

  <a-entity image-target></a-entity>
  <!--<a-entity id="a" targetname="" image-target geometry="primitive: plane" material="shader: flat; color: red"></a-entity>-->
  <!--<a-entity id="b" targetname="" image-target geometry="primitive: plane" material="shader: flat; color: green"></a-entity>-->
  <!--<a-entity id="c" targetname="" image-target geometry="primitive: plane" material="shader: flat; color: blue"></a-entity>-->

  <a-light type="ambient" intensity="1.3"></a-light>
  <a-light type="directional" intensity="3" position="1.5 2.5 0.6"></a-light>
</a-scene>
