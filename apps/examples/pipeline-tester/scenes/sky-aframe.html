<a-scene
  xrextras-loading
  xrextras-runtime-error
  landing-page
  xrlayers
  xrconfig="allowedDevices:any; verbose: true;"
  gltf-model="dracoDecoderPath: https://cdn.8thwall.com/web/aframe/draco-decoder-1.5.6/"
  sky-coaching-overlay
  renderer="colorManagement: true;">
  <a-assets>
    <a-asset-item id="doty" src="../assets/sky/doty.glb"></a-asset-item>
    <a-asset-item id="airship" src="../assets/sky/airship.glb"></a-asset-item>
    <!-- <a-asset-item id="doty" src="../assets/sky/airship-v1.glb"></a-asset-item> -->
    <img id="skyTexture" src="../assets/sky/space.jpeg" />
  </a-assets>

  <div
    class="segment"
    style="
      position: absolute;
      z-index: 100;
      bottom: 10%;
      transform: translate(-50%);
      left: 50%;
      width: 80%;
    ">
    <input
      type="range"
      id="slider"
      value="0.0"
      min="0.0"
      max="1.0"
      step="0.05"
      style="width: 100%"
      oninput="XR8.LayersController.configure({layers: {sky: {edgeSmoothness: parseFloat(this.value)}}});" />
  </div>

  <a-camera position="0 3 0"></a-camera>
  <a-entity light="type: ambient; intensity: .8;" />
  <!-- Purple scene cube. id is used by sky-aframe.tsx. -->
  <a-box opacity="0.0" position="0.15 0 -2" scale="0.2 0.2 0.2" id="non-sky-cube">
    <a-box
      position="0 0.5 0"
      shadow
      material="color: #AD50FF; shader: flat; src: https://cdn.8thwall.com/web/assets/cube-texture.png"></a-box>
  </a-box>

  <sky-scene id="skyScene" sky-debug>
    <!-- Green sky cube. id is used by sky-aframe.tsx-->
    <!-- <a-box opacity="0.0" position="0.15 0 -2" scale="0.2 0.2 0.2" id="sky-cube">
      <a-box
        position="0 0.5 0"
        shadow
        material="color: #8fce00; shader: flat; src: https://cdn.8thwall.com/web/assets/cube-texture.png"></a-box>
    </a-box> -->

    <a-sky material="src: #skyTexture; transparent: true; opacity: 1;"></a-sky>

    <a-entity
      gltf-model="#airship"
      position="-20 20 -55"
      rotation="0 -15 0"
      animation-mixer="clip: idle; loop: repeat;"
      scale="10 10 10" />
    <a-entity
      gltf-model="#doty"
      position="0 0 -25"
      rotation="0 0 0"
      scale="100 100 100"
      animation-mixer="clip: idle; loop: repeat;" />

    <a-entity
      light="type: directional; castShadow: true; color: white; intensity: 0.5"
      position="5 10 7"
      rotation="45 0 45" />
    <a-entity light="type: ambient; intensity: 1;" />
  </sky-scene>
</a-scene>
