<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrextras-pause-on-hidden
  renderer="maxCanvasWidth: 960; maxCanvasHeight: 960"
  hand-coaching-overlay
  xrhand="enableWrists: true;"
  xrconfig="cameraDirection:back; allowedDevices:any; mirroredDisplay:false;"
  hand-debug>
  <a-assets>
    <a-asset-item id="luxWatch" src="../assets/watch/luxWatchFinal.glb"></a-asset-item>
    <a-asset-item id="ring" src="../assets/ring/bigRing.glb"></a-asset-item>
  </a-assets>

  <a-camera
    look-controls="enabled: false"
    wasd-controls="enabled: false"
    position="0 1.6 0"></a-camera>

  <!-- Hand anchor primitive to nest hand tracking objects -->
  <xrextras-hand-anchor id="hand">
    <!-- Hand occluder made using hider-material and hand-mesh -->
    <xrextras-hand-occluder show="false" adjustment="0.001"></xrextras-hand-occluder>

    <!-- Hand mesh with indices -->
    <xrextras-hand-mesh
      wireframe="true"
      material="color:#7611B6; transparent:true; opacity:0.5"></xrextras-hand-mesh>

    <xrextras-wrist-mesh
      wireframe="true"
      material="color:#7611B6; transparent:true; opacity:0.5"
      occluder="true"></xrextras-wrist-mesh>

    <!-- Watch attachment point -->
    <xrextras-hand-attachment lock-wrist="false" point="wristTop">
      <!-- <a-cylinder
        id="wristOccluder"
        color="#FAFAFA"
        scale="1 1 1"
        position=".002 -0.055 .003"
        height=".1"
        radius="1"
        wrist-occluder
        xrextras-hider-material></a-cylinder> -->

      <a-entity
        id="watch"
        gltf-model="#luxWatch"
        reflections="type: static"
        scale="1 1 1"
        clock-animation
        position="0 0.005 0.02"
        rotation="0 90 0"></a-entity>
    </xrextras-hand-attachment>
    <!-- Ring attachment point -->
    <xrextras-hand-attachment point="ringLower">
      <a-entity
        id="ringEntity"
        gltf-model="#ring"
        position="0 -.003 0"
        reflections="type: static"
        scale="0.1 0.1 0.1"
        rotation="-8 0 0"></a-entity>
      <!-- <a-entity
        id="otherRing"
        gltf-model="#ring2"
        scale-to-hand="size:16; adjustment: 0.82"
        reflections="type: static"
        scale="1 1 1"
        rotation="90 180 0"
        position="0 0 0"
      ></a-entity> -->
    </xrextras-hand-attachment>
  </xrextras-hand-anchor>

  <a-light type="directional" target="#hand" position="0 1.8 3" intensity="0.8"></a-light>
  <a-light type="ambient" intensity="0.8"></a-light>
</a-scene>
