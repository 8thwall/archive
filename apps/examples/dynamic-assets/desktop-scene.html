<a-scene 
xrextras-tap-recenter
landing-page
xrextras-loading
xrextras-runtime-error
xrextras-gesture-detector
xrweb="allowedDevices: any">

  <a-assets>
    <a-asset-item id="model" src="./assets/model.glb"></a-asset-item>
  </a-assets>

  <a-entity 
    light="
      type: directional; 
      castShadow: true; 
      color: white; 
      intensity: 0.5" 
    position="5 10 7">
  </a-entity>
  
  <a-camera position="0 2 2"></a-camera>
  
  <a-entity gltf-model="#model"></a-entity>

  <a-plane 
    height="2000" 
    width="2000" 
    rotation="-90 0 0" 
    material="shader: shadow; opacity: 0.67" 
    shadow>
  </a-plane>  
</a-scene>
