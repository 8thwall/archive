<a class="carouselCard" href="{{ module.url }}" draggable="false">
  <div class="carouselCardContainer">
    <div class="carouselCardBrands">
      <img draggable="false" class="carouselCardBrandLogo" src="{{ module.brand_logos.brand_1.src }}" alt="{{ module.brand_logos.brand_1.alt }}" >
      {% if module.brand_logos.number_of_brands == "2" %}
        <img draggable="false" class="carouselCardBrandLogo" src="{{ module.brand_logos.brand_2.src }}" alt="{{ module.brand_logos.brand_2.alt }}" >
      {% endif %}
    </div>
    <div class="carouselCardImageContainer">
      <img draggable="false" class="carouselCardImage" src="{{ module.image.src }}" alt="{{ module.image.alt }}" >
    </div>
    <div class="carouselCardBody">
      <div class="carouselCardQnty">
        {{ module.quantity }}
      </div>
      <div class="carouselCardLabel">
        {{ module.stat_label }}
      </div>
    </div>
    <div class="carouselCardLink">
      Read case study
    </div>
  </div>
</a>
