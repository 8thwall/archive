
{% set speed = "circleSpeedMedium" %}
{% if module.speed == "fast" %}
  {% set speed = "circleSpeedFast" %}
{% endif %}
{% if module.speed == "slow" %}
  {% set speed = "circleSpeedSlow" %}
{% endif %}

<div class="caseStudyStatContainer">
  <div class="caseStudyGraphic">
    <div class="caseStudyNumber">{{ module.stat }}</div>
    <svg class="caseStudyUnderCircle" xlmns="http://www.w3.org/2000/svg" version="1.1" width="200px" height="200px">
      <circle cx="100" cy="100" r="80" stroke-linecap="round" />
    </svg>
    <svg class="caseStudyCircle {{speed}}" xlmns="http://www.w3.org/2000/svg" version="1.1" width="200px" height="200px">
      <defs>
        <linearGradient id="GradientColor" gradientTransform="rotate(135)">
          <stop offset="0%" stop-color="#C86DD7" />
          <stop offset="50%" stop-color="#AD50FF" />
        </linearGradient>
      </defs>
      <circle cx="100" cy="100" r="80" stroke-linecap="round" />
    </svg>
  </div>
  <h3 class="caseStudyHeading">{{ module.heading }}</h3>
</div>
